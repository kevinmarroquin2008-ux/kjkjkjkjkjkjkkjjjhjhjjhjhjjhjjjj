<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campo de Girasoles</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    background:linear-gradient(
        to bottom,
        #6ec6ff 0%,
        #a8e6ff 50%,
        #d4f7c5 100%
    );
}

/* Sol */
.sun{
    position:absolute;
    top:50px;
    right:80px;
    width:120px;
    height:120px;
    background:#ffd54f;
    border-radius:50%;
    box-shadow:0 0 60px #ffeb3b;
}

/* Nubes */
.cloud{
    position:absolute;
    background:white;
    border-radius:50px;
    opacity:0.8;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud1{
    width:120px;
    height:40px;
    top:90px;
    left:10%;
    animation:moveCloud 20s linear infinite;
}

.cloud1::before{
    width:50px;
    height:50px;
    top:-20px;
    left:15px;
}

.cloud1::after{
    width:60px;
    height:60px;
    top:-25px;
    right:15px;
}

@keyframes moveCloud{
    from{
        transform:translateX(-150px);
    }
    to{
        transform:translateX(calc(100vw + 200px));
    }
}

/* Césped */
.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:180px;
    background:linear-gradient(to top,#2e7d32,#4caf50);
}

/* Contenedor */
.field{
    display:flex;
    gap:50px;
    margin-bottom:120px;
}

/* Girasol */
.sunflower{
    position:relative;
    animation:sway 3s ease-in-out infinite alternate;
}

.stem{
    width:12px;
    height:180px;
    background:#2e7d32;
    margin:auto;
    border-radius:10px;
}

.center{
    position:absolute;
    top:-70px;
    left:50%;
    transform:translateX(-50%);
    width:60px;
    height:60px;
    background:#5d4037;
    border-radius:50%;
    z-index:2;
}

.petal{
    position:absolute;
    width:25px;
    height:50px;
    background:#ffca28;
    border-radius:50%;
    top:-65px;
    left:50%;
    transform-origin:center 60px;
}

.leaf{
    position:absolute;
    width:50px;
    height:25px;
    background:#43a047;
    border-radius:50%;
}

.leaf.left{
    top:80px;
    left:-40px;
    transform:rotate(-35deg);
}

.leaf.right{
    top:120px;
    right:-40px;
    transform:rotate(35deg);
}

@keyframes sway{
    from{
        transform:rotate(-3deg);
    }
    to{
        transform:rotate(3deg);
    }
}
</style>
</head>

<body>

<div class="sun"></div>
<div class="cloud cloud1"></div>

<div class="field">

    <div class="sunflower">
        <div class="stem"></div>
        <div class="leaf left"></div>
        <div class="leaf right"></div>

        <div class="center"></div>

        <div class="petal" style="transform:translateX(-50%) rotate(0deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(45deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(90deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(135deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(180deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(225deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(270deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(315deg);"></div>
    </div>

    <div class="sunflower">
        <div class="stem"></div>
        <div class="leaf left"></div>
        <div class="leaf right"></div>

        <div class="center"></div>

        <div class="petal" style="transform:translateX(-50%) rotate(0deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(45deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(90deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(135deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(180deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(225deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(270deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(315deg);"></div>
    </div>

    <div class="sunflower">
        <div class="stem"></div>
        <div class="leaf left"></div>
        <div class="leaf right"></div>

        <div class="center"></div>

        <div class="petal" style="transform:translateX(-50%) rotate(0deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(45deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(90deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(135deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(180deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(225deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(270deg);"></div>
        <div class="petal" style="transform:translateX(-50%) rotate(315deg);"></div>
    </div>

</div>

<div class="ground"></div>

</body>
</html>
